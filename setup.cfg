[rstcheck]
ignore_directives=
    autoclass,
    autodata,
    autoexception,
    automethod,
    automodule,
    autoprogram,
    autosummary,
    todo,
    todolist,
    testcode,
    testsetup,
    testcleanup,
    testoutput,
ignore_substitutions=
    version,
ignore_roles=
    showcase,
ignore_messages=(Duplicate implicit target name: \".+\"\.$|Hyperlink target \".+\" is not referenced\.$|Target name overrides implicit target name \"contributor license agreement\"\.)
; report_level=warning (enable when more INFO messages pop up)

[tool:pytest]
testpaths =
    tests
    tests_regression
norecursedirs =
    tests_regression/helpers
    tests_regression/sphinx
markers =
    longrunning: long running regression tests
    sphinx: provided by Sphinx
    with_sphinx: tests depending on Sphinx
filterwarnings =
    error::DeprecationWarning:rinoh[.*]
